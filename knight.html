<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>马走遍棋盘动画（可切换 7×7 / 8×8）</title>
<style>
  :root{
    --bg:#050505;
    --yellow:#ffeb00;
    --yellow-soft:#fff36a;
    --cream:#e5c776;
    --brown:#b85611;
    --panel:#101010;
    --text:#f4f4f4;
    --muted:#bbbbbb;
    --square-size:48px;
    --board-cells:8;
    --board-size:calc(var(--square-size) * var(--board-cells));
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    min-height:100vh;
    background:radial-gradient(circle at top, #151515 0, #050505 48%, #000 100%);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;
    overflow-x:hidden;
  }
  .app{
    width:min(100vw, 920px);
    margin:0 auto;
    padding:24px 14px 44px;
  }
  .phone-stage{
    margin:0 auto;
    width:min(100%, max(440px, calc(var(--board-size) + 48px)));
    min-height:780px;
    max-width:720px;
    border-radius:34px;
    padding:28px 18px 22px;
    background:#000;
    box-shadow:0 0 0 1px rgba(255,255,255,.08), 0 28px 70px rgba(0,0,0,.7);
    position:relative;
    overflow:hidden;
  }
  .phone-stage::before{
    content:"";
    position:absolute;
    inset:-40% -10% auto;
    height:320px;
    background:radial-gradient(circle, rgba(255,235,0,.12), transparent 60%);
    pointer-events:none;
  }
  h1{
    margin:0 auto 22px;
    line-height:1.05;
    text-align:center;
    color:var(--yellow);
    font-size:clamp(32px, 9.5vw, 54px);
    letter-spacing:1px;
    font-weight:900;
    text-shadow:0 0 14px rgba(255,235,0,.2);
  }
  .answer{
    text-align:center;
    margin:-8px auto 18px;
    color:#fff;
    font-size:18px;
    font-weight:800;
    line-height:1.5;
  }
  .answer span{color:var(--yellow)}
  .scene-tabs{
    display:flex;
    gap:8px;
    justify-content:center;
    margin:0 0 14px;
  }
  .scene-tabs button,.controls button, select{
    border:1px solid rgba(255,235,0,.38);
    background:rgba(255,235,0,.08);
    color:var(--yellow);
    border-radius:999px;
    padding:9px 14px;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    transition:.18s ease;
  }
  select{
    appearance:none;
    -webkit-appearance:none;
    padding-right:18px;
    min-width:110px;
    text-align:center;
  }
  .scene-tabs button.active,.controls button.primary{
    background:var(--yellow);
    color:#000;
    box-shadow:0 0 18px rgba(255,235,0,.35);
  }
  .caption{
    text-align:center;
    color:#eee;
    min-height:44px;
    font-size:17px;
    line-height:1.45;
    margin:12px 4px 10px;
    font-weight:700;
  }
  .caption small{color:var(--muted);font-weight:500}
  .board-wrap{
    position:relative;
    width:min(100%, var(--board-size));
    max-width:none;
    margin:0 auto;
    aspect-ratio:1/1;
    user-select:none;
  }
  .board{
    position:absolute;
    inset:0;
    display:grid;
    border:2px solid rgba(255,255,255,.12);
    box-shadow:0 0 0 5px rgba(255,235,0,.04), 0 18px 60px rgba(0,0,0,.55);
    overflow:hidden;
  }
  .square{
    position:relative;
    display:flex;
    align-items:flex-start;
    justify-content:flex-start;
    padding:4px;
    font-size:10px;
    color:rgba(0,0,0,.45);
    font-weight:800;
  }
  .square.light{background:var(--cream)}
  .square.dark{background:var(--brown)}
  .square.visited::after{
    content:"";
    position:absolute;
    inset:10%;
    border-radius:12px;
    background:rgba(255,235,0,.30);
    box-shadow:0 0 16px rgba(255,235,0,.4) inset, 0 0 14px rgba(255,235,0,.2);
    animation:pop .34s ease;
  }
  .square.current::before{
    content:"";
    position:absolute;
    inset:8%;
    border:2px solid var(--yellow);
    border-radius:13px;
    box-shadow:0 0 18px rgba(255,235,0,.9);
    z-index:2;
  }
  .step-num{
    position:absolute;
    right:3px;
    bottom:2px;
    z-index:3;
    font-size:clamp(7px,2vw,11px);
    color:rgba(0,0,0,.72);
    font-weight:900;
  }
  @keyframes pop{
    0%{transform:scale(.2);opacity:.2}
    100%{transform:scale(1);opacity:1}
  }
  .route-svg{
    position:absolute;
    inset:0;
    overflow:visible;
    pointer-events:none;
    z-index:5;
  }
  .route-line{
    fill:none;
    stroke:var(--yellow);
    stroke-width:12;
    stroke-linecap:round;
    stroke-linejoin:round;
    filter:drop-shadow(0 0 5px rgba(255,235,0,.95));
  }
  .ghost-line{
    fill:none;
    stroke:rgba(255,235,0,.16);
    stroke-width:7;
    stroke-linecap:round;
    stroke-linejoin:round;
  }
  .closure-line{
    fill:none;
    stroke:var(--yellow-soft);
    stroke-width:8;
    stroke-linecap:round;
    stroke-linejoin:round;
    stroke-dasharray:18 16;
    opacity:0;
    filter:drop-shadow(0 0 7px rgba(255,235,0,.9));
    transition:opacity .35s ease;
  }
  .knight{
    position:absolute;
    z-index:8;
    display:grid;
    place-items:center;
    font-size:clamp(22px, calc(var(--square-size) * .86), 68px);
    color:white;
    text-shadow:0 2px 0 #111, 0 0 14px rgba(255,255,255,.6), 0 0 18px rgba(255,235,0,.55);
    transform:translate(-50%, -50%);
    transition:filter .2s ease;
  }
  .knight.flying{filter:drop-shadow(0 0 18px rgba(255,235,0,.9))}
  .counter{
    display:flex;
    justify-content:space-between;
    gap:12px;
    margin:16px auto 0;
    width:min(100%, var(--board-size));
    max-width:none;
    font-size:14px;
    color:#fff;
  }
  .counter .pill{
    flex:1;
    border:1px solid rgba(255,255,255,.13);
    background:rgba(255,255,255,.055);
    border-radius:16px;
    padding:10px 12px;
    text-align:center;
  }
  .counter b{color:var(--yellow);font-size:19px}
  .controls{
    width:min(100%, var(--board-size));
    max-width:none;
    margin:14px auto 0;
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    justify-content:center;
    gap:8px;
  }
  .speed{
    width:128px;
    accent-color:var(--yellow);
  }
  .control-label{
    display:flex;
    align-items:center;
    gap:8px;
    color:#ddd;
    font-size:13px;
    white-space:nowrap;
  }
  .hint{
    width:min(100%, var(--board-size));
    max-width:none;
    margin:14px auto 0;
    color:#cfcfcf;
    text-align:center;
    font-size:13px;
    line-height:1.5;
  }
  .mini-wrap{
    position:relative;
    width:min(100%, 330px);
    margin:22px auto 0;
    aspect-ratio:1/1;
  }
  .mini-board{
    position:absolute;
    inset:0;
    display:grid;
    grid-template-columns:repeat(5,1fr);
    grid-template-rows:repeat(5,1fr);
    overflow:hidden;
    border:2px solid rgba(255,255,255,.12);
  }
  .mini-svg{
    position:absolute;
    inset:0;
    z-index:4;
    overflow:visible;
    pointer-events:none;
  }
  .mini-knight{
    position:absolute;
    z-index:6;
    width:20%;
    height:20%;
    display:grid;
    place-items:center;
    transform:translate(-50%,-50%);
    font-size:44px;
    color:#fff;
    text-shadow:0 0 15px rgba(255,235,0,.85);
    animation:miniJump 3.6s ease-in-out infinite;
  }
  @keyframes miniJump{
    0%,18%{left:50%;top:50%}
    32%,52%{left:90%;top:70%}
    68%,100%{left:50%;top:50%}
  }
  .mini-path1{
    stroke-dasharray:450;
    stroke-dashoffset:450;
    animation:drawMini 3.6s ease-in-out infinite;
  }
  @keyframes drawMini{
    0%,18%{stroke-dashoffset:450}
    46%,70%{stroke-dashoffset:0}
    100%{stroke-dashoffset:450}
  }
  .dot{
    fill:var(--yellow);
    filter:drop-shadow(0 0 6px rgba(255,235,0,.9));
    opacity:.9;
  }
  .scene{display:none}
  .scene.show{display:block}
  .footer-line{
    text-align:center;
    margin:26px 0 4px;
    color:white;
    font-size:18px;
    font-weight:800;
  }
  .footer-line span{color:var(--yellow)}
  @media (max-width:460px){
    .app{padding:0}
    .phone-stage{
      border-radius:0;
      min-height:100vh;
      width:100%;
      max-width:none;
      box-shadow:none;
      padding-top:28px;
    }
  }
</style>
</head>

<body>
  <main class="app">
    <section class="phone-stage">
      <h1>可以让马走遍<br>整个国际象棋棋盘吗？</h1>

      <div class="answer">
        答案：<span>可以</span>。<br>
        现在可以切换 <span>7×7</span> 和 <span>8×8</span> 棋盘。
      </div>

      <div class="scene-tabs">
        <button id="tabRule" class="active" type="button">① 马怎么走</button>
        <button id="tabTour" type="button">② 巡游动画</button>
      </div>

      <section id="sceneRule" class="scene show">
        <div class="caption">
          马每一步走成“日”字：<br>
          <small>先走2格，再转90°走1格。</small>
        </div>

        <div class="mini-wrap">
          <div class="mini-board" aria-label="5 by 5 mini board"></div>

          <svg class="mini-svg" viewBox="0 0 500 500" preserveAspectRatio="none">
            <path class="ghost-line" d="M250 250 L250 350 L450 350" />
            <path class="route-line mini-path1" d="M250 250 L250 350 L450 350" />
            <circle class="dot" cx="450" cy="350" r="14" />
          </svg>

          <div class="mini-knight">♞</div>
        </div>

        <div class="hint">
          上面的黄色折线表示“2格 + 1格”的合法跳法。下一步看它如何不重复地走完全部格子。
        </div>

        <div class="controls">
          <button id="goTour" class="primary" type="button">开始看巡游动画</button>
        </div>
      </section>

      <section id="sceneTour" class="scene">
        <div class="caption" id="tourCaption">
          黄色线会依次连接每次落点。<br>
          <small>8×8 显示闭合巡游；7×7 显示开放巡游。</small>
        </div>

        <div class="board-wrap" id="boardWrap">
          <div class="board" id="board" aria-label="chess board"></div>

          <svg class="route-svg" id="routeSvg" viewBox="0 0 800 800" preserveAspectRatio="none">
            <polyline id="ghostRoute" class="ghost-line" points="" />
            <polyline id="routeLine" class="route-line" points="" />
            <polyline id="closureLine" class="closure-line" points="" />
          </svg>

          <div class="knight" id="knight">♞</div>
        </div>

        <div class="counter">
          <div class="pill">
            已走格数<br>
            <b id="visitedCount">1</b> / <span id="totalCount">64</span>
          </div>

          <div class="pill">
            当前步数<br>
            <b id="moveCount">0</b> 步
          </div>
        </div>

        <div class="controls">
          <button id="playBtn" class="primary" type="button">播放</button>
          <button id="restartBtn" type="button">重来</button>
          <button id="finishBtn" type="button">显示完整路线</button>

          <label class="control-label">
            棋盘大小
            <select id="boardSizeSelect">
              <option value="7">7 × 7</option>
              <option value="8" selected>8 × 8</option>
            </select>
          </label>

          <label class="control-label">
            速度
            <input id="speed" class="speed" type="range" min="180" max="1200" value="520" />
          </label>
        </div>

        <div class="hint" id="tourHint">
          8×8 是闭合骑士巡游：第64格和第1格相差一个马步，所以可以接回起点。切换到 7×7 后，会显示一条开放巡游路线。
        </div>
      </section>

      <div class="footer-line">
        马能走遍整个棋盘：<span>YES</span>
      </div>
    </section>
  </main>

<script>
const tours = {
  7: {
    closed: false,
    path: [
      [0,0],[1,2],[2,0],[0,1],[1,3],[0,5],[2,6],
      [4,5],[6,6],[5,4],[4,6],[6,5],[5,3],[6,1],
      [4,0],[2,1],[0,2],[1,0],[3,1],[5,0],[6,2],
      [4,1],[6,0],[5,2],[3,3],[2,5],[0,6],[1,4],
      [3,5],[5,6],[6,4],[4,3],[5,5],[3,4],[2,2],
      [0,3],[1,5],[3,6],[2,4],[1,6],[0,4],[2,3],
      [1,1],[3,2],[4,4],[6,3],[4,2],[3,0],[5,1]
    ]
  },

  8: {
    closed: true,
    path: [
      [0,0],[2,1],[4,0],[6,1],[7,3],[5,2],[6,0],[7,2],
      [6,4],[7,6],[5,7],[3,6],[4,4],[2,3],[1,1],[3,2],
      [2,4],[0,3],[1,5],[0,7],[2,6],[4,5],[3,3],[4,1],
      [5,3],[7,4],[6,6],[4,7],[5,5],[3,4],[4,2],[3,0],
      [2,2],[4,3],[5,1],[7,0],[6,2],[5,4],[3,5],[2,7],
      [0,6],[1,4],[0,2],[1,0],[3,1],[5,0],[7,1],[6,3],
      [7,5],[6,7],[4,6],[6,5],[7,7],[5,6],[3,7],[1,6],
      [0,4],[2,5],[1,7],[0,5],[1,3],[0,1],[2,0],[1,2]
    ]
  }
};

const board = document.getElementById('board');
const knight = document.getElementById('knight');
const routeSvg = document.getElementById('routeSvg');
const routeLine = document.getElementById('routeLine');
const closureLine = document.getElementById('closureLine');
const ghostRoute = document.getElementById('ghostRoute');
const visitedCount = document.getElementById('visitedCount');
const totalCount = document.getElementById('totalCount');
const moveCount = document.getElementById('moveCount');
const playBtn = document.getElementById('playBtn');
const restartBtn = document.getElementById('restartBtn');
const finishBtn = document.getElementById('finishBtn');
const speedInput = document.getElementById('speed');
const boardSizeSelect = document.getElementById('boardSizeSelect');
const tabRule = document.getElementById('tabRule');
const tabTour = document.getElementById('tabTour');
const sceneRule = document.getElementById('sceneRule');
const sceneTour = document.getElementById('sceneTour');
const goTour = document.getElementById('goTour');
const tourCaption = document.getElementById('tourCaption');
const tourHint = document.getElementById('tourHint');

let squares = [];
let running = false;
let index = 0;
let lastTime = null;
let carry = 0;
let stepDuration = Number(speedInput.value);
let boardN = 8;
let currentTour = tours[8].path;
let isClosed = tours[8].closed;

function makeMiniBoard(){
  const mini = document.querySelector('.mini-board');
  mini.innerHTML = '';

  for(let r = 0; r < 5; r++){
    for(let c = 0; c < 5; c++){
      const cell = document.createElement('div');
      cell.className = 'mini-cell';
      cell.style.background = (r + c) % 2 === 0 ? 'var(--cream)' : 'var(--brown)';
      mini.appendChild(cell);
    }
  }
}

function centerPoint(p){
  return `${p[0] * 100 + 50},${p[1] * 100 + 50}`;
}

function pctPoint(p){
  const scale = 100 / boardN;
  return {
    x: (p[0] + 0.5) * scale,
    y: (p[1] + 0.5) * scale
  };
}

function sqAt(p){
  return squares[p[1] * boardN + p[0]];
}

function updateTourText(){
  const total = boardN * boardN;
  totalCount.textContent = total;

  if(isClosed){
    tourCaption.innerHTML =
      `黄色线会依次连接每次落点。<br><small>${boardN}×${boardN} 这里显示的是闭合巡游：最后一格可以再跳回起点。</small>`;

    tourHint.textContent =
      `${boardN}×${boardN} 是闭合骑士巡游：第${total}格和第1格相差一个马步，所以可以接回起点。`;
  }else{
    tourCaption.innerHTML =
      `黄色线会依次连接每次落点。<br><small>${boardN}×${boardN} 这里显示的是开放巡游：可以走完全部格子，但最后一格不一定能跳回起点。</small>`;

    tourHint.textContent =
      `${boardN}×${boardN} 这里展示开放巡游。因为总格数是奇数，不能形成闭合回路，所以最后一格不会接回第1格。`;
  }
}

function makeBoard(){
  document.documentElement.style.setProperty('--board-cells', String(boardN));

  board.style.gridTemplateColumns = `repeat(${boardN}, 1fr)`;
  board.style.gridTemplateRows = `repeat(${boardN}, 1fr)`;
  board.setAttribute('aria-label', `${boardN} by ${boardN} chess board`);

  routeSvg.setAttribute('viewBox', `0 0 ${boardN * 100} ${boardN * 100}`);

  const pieceSize = 100 / boardN;
  knight.style.width = pieceSize + '%';
  knight.style.height = pieceSize + '%';

  board.innerHTML = '';
  squares = [];

  for(let y = 0; y < boardN; y++){
    for(let x = 0; x < boardN; x++){
      const sq = document.createElement('div');
      sq.className = 'square ' + ((x + y) % 2 === 0 ? 'light' : 'dark');
      sq.dataset.x = x;
      sq.dataset.y = y;
      board.appendChild(sq);
      squares.push(sq);
    }
  }

  ghostRoute.setAttribute('points', currentTour.map(centerPoint).join(' '));

  if(isClosed){
    closureLine.setAttribute(
      'points',
      `${centerPoint(currentTour[currentTour.length - 1])} ${centerPoint(currentTour[0])}`
    );
  }else{
    closureLine.setAttribute('points', '');
    closureLine.style.opacity = '0';
  }

  updateTourText();
}

function markVisited(upto){
  squares.forEach(s => {
    s.classList.remove('visited','current');
    s.querySelector('.step-num')?.remove();
  });

  for(let i = 0; i <= upto; i++){
    const s = sqAt(currentTour[i]);
    s.classList.add('visited');

    const num = document.createElement('div');
    num.className = 'step-num';
    num.textContent = i + 1;
    s.appendChild(num);
  }

  sqAt(currentTour[upto]).classList.add('current');

  visitedCount.textContent = Math.min(upto + 1, currentTour.length);
  moveCount.textContent = Math.min(upto, currentTour.length - 1);
}

function setKnightAtProgress(i, t = 0){
  const a = currentTour[Math.min(i, currentTour.length - 1)];
  const b = currentTour[Math.min(i + 1, currentTour.length - 1)];

  const pa = pctPoint(a);
  const pb = pctPoint(b);

  const ease = t < 0.5
    ? 2 * t * t
    : 1 - Math.pow(-2 * t + 2, 2) / 2;

  const x = pa.x + (pb.x - pa.x) * ease;
  const y = pa.y + (pb.y - pa.y) * ease;
  const hop = Math.sin(Math.PI * t) * -7;

  knight.style.left = x + '%';
  knight.style.top = `calc(${y}% + ${hop}px)`;
  knight.style.transform = `translate(-50%, -50%) rotate(${(pb.x - pa.x) * 0.55}deg)`;
  knight.classList.toggle('flying', t > 0 && t < 1);
}

function updateRoute(upto){
  routeLine.setAttribute(
    'points',
    currentTour.slice(0, upto + 1).map(centerPoint).join(' ')
  );

  closureLine.style.opacity =
    (isClosed && upto >= currentTour.length - 1) ? '1' : '0';
}

function reset(){
  running = false;
  playBtn.textContent = '播放';
  index = 0;
  carry = 0;
  lastTime = null;

  markVisited(0);
  updateRoute(0);
  setKnightAtProgress(0, 0);
}

function finish(){
  running = false;
  playBtn.textContent = '播放';
  index = currentTour.length - 1;

  markVisited(index);
  updateRoute(index);
  setKnightAtProgress(index, 0);
}

function tick(ts){
  if(!running) return;

  if(lastTime === null) lastTime = ts;

  const dt = ts - lastTime;
  lastTime = ts;
  carry += dt;

  while(carry >= stepDuration && index < currentTour.length - 1){
    carry -= stepDuration;
    index++;
    markVisited(index);
    updateRoute(index);
  }

  if(index >= currentTour.length - 1){
    finish();
    return;
  }

  setKnightAtProgress(index, carry / stepDuration);

  const pts = currentTour.slice(0, index + 1).map(centerPoint);
  const a = currentTour[index];
  const b = currentTour[index + 1];
  const t = carry / stepDuration;

  const x = (a[0] * 100 + 50) + ((b[0] - a[0]) * 100) * t;
  const y = (a[1] * 100 + 50) + ((b[1] - a[1]) * 100) * t;

  pts.push(`${x},${y}`);
  routeLine.setAttribute('points', pts.join(' '));

  requestAnimationFrame(tick);
}

function play(){
  if(index >= currentTour.length - 1) reset();

  running = true;
  playBtn.textContent = '暂停';
  lastTime = null;

  requestAnimationFrame(tick);
}

function pause(){
  running = false;
  playBtn.textContent = '播放';
}

function showScene(which){
  const isRule = which === 'rule';

  sceneRule.classList.toggle('show', isRule);
  sceneTour.classList.toggle('show', !isRule);
  tabRule.classList.toggle('active', isRule);
  tabTour.classList.toggle('active', !isRule);

  if(!isRule){
    setTimeout(() => {
      reset();
      play();
    }, 60);
  }else{
    pause();
  }
}

function setBoardSize(n){
  boardN = Number(n);
  currentTour = tours[boardN].path;
  isClosed = tours[boardN].closed;

  boardSizeSelect.value = String(boardN);
  localStorage.setItem('knightTourBoardSize', String(boardN));

  makeBoard();
  reset();

  if(sceneTour.classList.contains('show')) play();
}

playBtn.addEventListener('click', () => running ? pause() : play());

restartBtn.addEventListener('click', () => {
  reset();
  play();
});

finishBtn.addEventListener('click', finish);

speedInput.addEventListener('input', () => {
  stepDuration = Number(speedInput.value);
});

boardSizeSelect.addEventListener('change', () => {
  setBoardSize(boardSizeSelect.value);
});

tabRule.addEventListener('click', () => showScene('rule'));
tabTour.addEventListener('click', () => showScene('tour'));
goTour.addEventListener('click', () => showScene('tour'));

makeMiniBoard();
setBoardSize(localStorage.getItem('knightTourBoardSize') || '8');
</script>
</body>
</html>
