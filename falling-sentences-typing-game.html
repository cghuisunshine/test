<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8' />
  <meta name='viewport' content='width=device-width, initial-scale=1.0' />
  <title>Falling Sentences Typing Game</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --sky-top: #dff3ff;
      --sky-mid: #f8fcff;
      --sky-bottom: #e9f7e9;
      --panel-bg: rgba(255, 255, 255, 0.94);
      --panel-border: #cfd8dc;
      --primary: #1e88e5;
      --ground-dark: #4a8b45;
      --ground-light: #97d28d;
      --text: #203040;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(to bottom, var(--sky-top) 0%, var(--sky-mid) 60%, var(--sky-bottom) 100%);
      overflow: hidden;
      color: var(--text);
    }

    #game {
      position: relative;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      touch-action: manipulation;
    }

    #sceneCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    #hud {
      position: absolute;
      top: calc(12px + env(safe-area-inset-top, 0px));
      left: calc(12px + env(safe-area-inset-left, 0px));
      right: calc(12px + env(safe-area-inset-right, 0px));
      z-index: 20;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
    }

    .panel {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      padding: 10px 14px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
      backdrop-filter: blur(6px);
    }

    #stats {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 15px;
    }

    #controls {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
      row-gap: 10px;
    }

    #hud.is-playing {
      justify-content: flex-end;
    }

    #hud.is-playing #stats,
    #hud.is-playing #startBtn,
    #hud.is-playing #restartBtn,
    #hud.is-playing #modeHint {
      display: none;
    }

    #hud.is-playing #controls {
      gap: 0;
      padding: 8px;
      border-radius: 999px;
      flex-wrap: nowrap;
      row-gap: 0;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: var(--primary);
      color: white;
      transition: transform 120ms ease, box-shadow 120ms ease, opacity 120ms ease;
      box-shadow: 0 6px 14px rgba(30, 136, 229, 0.18);
    }

    button:hover:not(:disabled) {
      opacity: 0.96;
      transform: translateY(-1px);
      box-shadow: 0 10px 20px rgba(30, 136, 229, 0.22);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    #typingBar {
      position: absolute;
      left: 50%;
      bottom: calc(18px + env(safe-area-inset-bottom, 0px));
      transform: translateX(-50%);
      width: min(760px, calc(100vw - 28px - env(safe-area-inset-left, 0px) - env(safe-area-inset-right, 0px)));
      z-index: 30;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.93);
      border: 1px solid rgba(207, 216, 220, 0.95);
      border-radius: 18px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.10);
      backdrop-filter: blur(10px);
    }

    #typingMeta {
      flex: 1 1 auto;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    #targetInfo {
      font-size: 12px;
      color: #44515a;
      min-height: 16px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #progressInfo {
      font-size: 11px;
      color: #60727d;
      min-height: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 140ms ease, opacity 140ms ease;
    }

    #progressInfo.is-feedback {
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    #progressInfo[data-tone='success'] {
      color: #1f6a3d;
    }

    #progressInfo[data-tone='danger'] {
      color: #b24343;
    }

    #progressInfo[data-tone='prompt'] {
      color: #1e88e5;
    }

    #keyboardBadge {
      display: none;
      flex: 0 0 auto;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #1e88e5;
      background: rgba(30, 136, 229, 0.10);
      border: 1px solid rgba(30, 136, 229, 0.20);
      border-radius: 999px;
      padding: 6px 10px;
      user-select: none;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease, opacity 160ms ease;
    }

    #keyboardBadge.is-prompt {
      background: rgba(30, 136, 229, 0.18);
      box-shadow: 0 0 0 3px rgba(30, 136, 229, 0.14);
      transform: scale(1.04);
      opacity: 1;
    }

    #typingInput {
      flex: 0 1 280px;
      min-width: 220px;
      width: 100%;
      padding: 10px 12px;
      font-size: 16px;
      border-radius: 10px;
      border: 2px solid #90caf9;
      outline: none;
      background: rgba(255, 255, 255, 0.98);
      color: var(--text);
    }

    #typingInput:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(30, 136, 229, 0.15);
    }

    #ground {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 70px;
      background: linear-gradient(to top, #6fae63, var(--ground-light));
      border-top: 3px solid var(--ground-dark);
      z-index: 10;
    }

    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }

    #overlayContent {
      width: min(520px, 92vw);
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 14px 32px rgba(0, 0, 0, 0.2);
      text-align: center;
    }

    #overlayContent h2 {
      margin-top: 0;
      font-size: 30px;
    }

    #results {
      text-align: left;
      margin: 18px 0;
      font-size: 17px;
      line-height: 1.8;
    }

    .small {
      font-size: 13px;
      color: #66757f;
    }

    #modeHint {
      display: inline-flex;
      align-items: center;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(30, 136, 229, 0.08);
      color: #36627f;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    #configMenuWrap {
      position: relative;
    }

    #menuBtn {
      min-width: 44px;
      padding: 10px 13px;
      font-size: 14px;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
    }

    #menuBtn .icon {
      font-size: 18px;
      line-height: 1;
    }

    #menuBtn .label {
      letter-spacing: 0.01em;
    }

    #configMenu {
      position: absolute;
      top: calc(100% + 10px);
      right: 0;
      width: min(440px, calc(100vw - 24px));
      display: none;
      flex-direction: column;
      gap: 12px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.99);
      border: 1px solid rgba(207, 216, 220, 0.98);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.18);
      backdrop-filter: blur(12px);
      z-index: 40;
    }

    #configMenu.open {
      display: flex;
    }

    #configMenuHeader {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
    }

    #configMenuHeader strong {
      font-size: 16px;
    }

    .menuSectionLabel {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #6b7f8a;
    }

    #customSentenceInput {
      width: 100%;
      min-height: 120px;
      resize: vertical;
      padding: 12px 13px;
      border-radius: 12px;
      border: 1px solid #cfd8dc;
      font: 14px/1.5 Arial, Helvetica, sans-serif;
      color: var(--text);
      background: rgba(255,255,255,0.98);
    }

    #customSentenceInput:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(30, 136, 229, 0.12);
    }

    #customPanelControls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    #sentenceFileInput {
      width: 100%;
      max-width: 100%;
      font-size: 13px;
      padding: 8px 0 2px;
    }

    #applySentenceBankBtn {
      flex: 1 1 190px;
    }

    #resetSentenceBankBtn {
      flex: 1 1 170px;
      background: #eef4f8;
      color: #35576d;
      box-shadow: none;
    }

    #resetSentenceBankBtn:hover:not(:disabled) {
      box-shadow: 0 10px 18px rgba(83, 115, 137, 0.14);
    }

    #sentenceBankStatus {
      width: 100%;
      font-size: 12px;
      color: #546670;
      background: #f3f8fb;
      border: 1px solid #dde8ef;
      border-radius: 10px;
      padding: 9px 10px;
    }

    @media (max-width: 640px) {
      #hud {
        gap: 10px;
      }

      .panel {
        padding: 9px 12px;
      }

      #controls {
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
      }

      #stats {
        font-size: 14px;
        gap: 10px;
      }

      #typingBar {
        width: min(96vw, 420px);
        bottom: calc(12px + env(safe-area-inset-bottom, 0px));
        justify-content: space-between;
        gap: 10px;
        padding: 8px 10px;
        border-radius: 999px;
      }

      #typingMeta,
      #keyboardBadge {
        position: relative;
        z-index: 1;
        pointer-events: none;
      }

      #modeHint,
      #menuBtn .label {
        display: none;
      }

      #keyboardBadge {
        display: block;
      }

      #typingInput {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        opacity: 0.01;
        pointer-events: auto;
        border: 0;
        padding: 0;
        margin: 0;
        left: 0;
        bottom: 0;
        min-width: 0;
        min-height: 0;
        background: transparent;
        color: transparent;
        caret-color: transparent;
        z-index: 2;
      }

      #configMenu {
        position: fixed;
        top: calc(12px + env(safe-area-inset-top, 0px));
        right: auto;
        bottom: auto;
        left: 50%;
        transform: translateX(-50%);
        width: min(420px, calc(100vw - 24px - env(safe-area-inset-left, 0px) - env(safe-area-inset-right, 0px)));
        max-width: calc(100vw - 24px - env(safe-area-inset-left, 0px) - env(safe-area-inset-right, 0px));
        max-height: calc(100dvh - 24px - env(safe-area-inset-top, 0px) - env(safe-area-inset-bottom, 0px));
        overflow: auto;
        overscroll-behavior: contain;
        -webkit-overflow-scrolling: touch;
      }

      #customSentenceInput {
        min-height: 72px;
      }
    }
  </style>
</head>
<body>
  <div id='game'>
    <canvas id='sceneCanvas'></canvas>

    <div id='hud'>
      <div id='stats' class='panel'>
        <div><strong>Score:</strong> <span id='score'>0</span></div>
        <div><strong>Cleared:</strong> <span id='cleared'>0</span></div>
        <div><strong>Missed:</strong> <span id='missed'>0</span></div>
        <div><strong>Accuracy:</strong> <span id='accuracy'>100%</span></div>
        <div><strong>Grade:</strong> <span id='grade'>A</span></div>
      </div>

      <div id='controls' class='panel'>
        <button id='startBtn'>Start</button>
        <button id='restartBtn'>Restart</button>
        <span id='modeHint'>Single sentence mode</span>
        <div id='configMenuWrap'>
          <button id='menuBtn' type='button' aria-label='Open settings' aria-expanded='false'>
            <span class='icon'>☰</span>
            <span class='label'>Settings</span>
          </button>
          <div id='configMenu' role='dialog' aria-label='Game settings'>
            <div id='configMenuHeader'>
              <strong>Customize sentences</strong>
              <span class='small'>Paste one sentence per line, or upload a plain text file.</span>
            </div>
            <span class='menuSectionLabel'>Sentence list</span>
            <textarea id='customSentenceInput' placeholder='Paste custom sentences here, one per line'></textarea>
            <span class='menuSectionLabel'>Import or apply</span>
            <div id='customPanelControls'>
              <input id='sentenceFileInput' type='file' accept='.txt,text/plain' />
              <button id='applySentenceBankBtn' type='button'>Use Custom Sentences</button>
              <button id='resetSentenceBankBtn' type='button'>Use Default Sentences</button>
              <span id='sentenceBankStatus'>Using the default sentence set.</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id='typingBar'>
      <div id='typingMeta'>
        <div id='targetInfo'>Loading Pretext renderer...</div>
        <div id='progressInfo'>Tap anywhere to keep typing.</div>
      </div>
      <input
        id='typingInput'
        type='text'
        placeholder='Type here...'
        autocomplete='off'
        autocapitalize='off'
        autocorrect='off'
        spellcheck='false'
        enterkeyhint='done'
        inputmode='text'
      />
      <div id='keyboardBadge'>Tap to type</div>
    </div>

    <div id='ground'></div>

    <div id='overlay'>
      <div id='overlayContent'>
        <h2>Game Over</h2>
        <div id='results'></div>
        <button id='playAgainBtn'>Play Again</button>
      </div>
    </div>
  </div>

  <script type='module'>
    (async () => {
      const DEFAULT_SENTENCE_BANK = `The cat sleeps under the warm window.
Learning to type quickly takes steady practice.
Small steps every day can build strong habits.
The stars shine brightly above the quiet town.
A careful student reviews the lesson each evening.
Fresh rain made the garden smell clean and sweet.
Reading good books can expand the mind.
The little bird landed softly on the fence.
Teamwork often makes difficult problems easier to solve.
A clear plan helps people finish work on time.
The river moved slowly through the green valley.
Good communication prevents many common mistakes.
Sunlight filled the classroom on Monday morning.
The young athlete trained hard for the race.
Patience is useful when learning a new skill.
The baker placed warm bread on the wooden table.
The moon appeared behind a thin silver cloud.
A kind teacher can change a student's life.
Healthy habits improve both energy and focus.
The library was silent except for turning pages.`.trim().split('\n');
      let sentenceBank = [...DEFAULT_SENTENCE_BANK];

      const MOBILE_QUERY = '(max-width: 640px), (hover: none) and (pointer: coarse)';

      const game = document.getElementById('game');
      const hud = document.getElementById('hud');
      const sceneCanvas = document.getElementById('sceneCanvas');
      const input = document.getElementById('typingInput');
      const targetInfo = document.getElementById('targetInfo');
      const progressInfo = document.getElementById('progressInfo');
      const typingBar = document.getElementById('typingBar');
      const keyboardBadge = document.getElementById('keyboardBadge');
      const customSentenceInput = document.getElementById('customSentenceInput');
      const sentenceFileInput = document.getElementById('sentenceFileInput');
      const applySentenceBankBtn = document.getElementById('applySentenceBankBtn');
      const resetSentenceBankBtn = document.getElementById('resetSentenceBankBtn');
      const sentenceBankStatus = document.getElementById('sentenceBankStatus');
      const menuBtn = document.getElementById('menuBtn');
      const configMenu = document.getElementById('configMenu');
      const configMenuWrap = document.getElementById('configMenuWrap');
      const overlay = document.getElementById('overlay');
      const results = document.getElementById('results');

      const scoreEl = document.getElementById('score');
      const clearedEl = document.getElementById('cleared');
      const missedEl = document.getElementById('missed');
      const accuracyEl = document.getElementById('accuracy');
      const gradeEl = document.getElementById('grade');

      const startBtn = document.getElementById('startBtn');
      const restartBtn = document.getElementById('restartBtn');
      const playAgainBtn = document.getElementById('playAgainBtn');

      const sceneCtx = sceneCanvas.getContext('2d');
      const mobileQuery = window.matchMedia(MOBILE_QUERY);

      const GROUND_HEIGHT = 70;
      const SENTENCE_FONT = '600 22px Arial';
      const SENTENCE_LINE_HEIGHT = 32;
      const BOX_PADDING_X = 18;
      const BOX_PADDING_Y = 16;
      const MAX_MISSED = 5;
      const DANDELION_GUST = 34;
      const DANDELION_GRAVITY = 7;
      const MOBILE_KEYBOARD_OPEN_THRESHOLD = 120;
      const MOBILE_KEYBOARD_SETTLE_MS = 160;
      const MOBILE_KEYBOARD_POSITION_TOLERANCE = 12;

      const sentencePalette = {
        fill: 'rgba(255, 255, 255, 0.95)',
        border: '#b0bec5',
        activeFill: 'rgba(255, 255, 255, 0.98)',
        activeBorder: '#1e88e5',
        hitFill: '#ffe0e0',
        hitBorder: '#e57373',
        text: '#22313a',
        correctBg: '#d9f2d6',
        correctText: '#1b5e20',
        wrongBg: '#ffd6da',
        wrongText: '#b71c1c',
        pendingSpace: '#ff8f00'
      };

      let prepareWithSegments;
      let layoutWithLines;

      try {
        ({ prepareWithSegments, layoutWithLines } = await import('https://cdn.jsdelivr.net/npm/@chenglou/pretext@0.0.5/dist/layout.js'));
      } catch (error) {
        targetInfo.textContent = 'Pretext could not be loaded from the CDN.';
        progressInfo.textContent = 'The game cannot start without the text layout library.';
        startBtn.disabled = true;
        restartBtn.disabled = true;
        playAgainBtn.disabled = true;
        console.error(error);
        return;
      }

      let sentences = [];
      let running = false;
      let activeSentenceId = null;
      let lastTime = 0;
      let nextId = 1;
      let gameToken = 0;
      let typedValue = '';
      let lastInputValue = '';
      let transientProgressTimer = 0;
      let transientProgressMessage = '';
      let keyboardPromptTimer = 0;
      let dandelionParticles = [];
      let mobileKeyboardFloorState = {
        phase: 'closed',
        stableBottom: null,
        lastBottom: null,
        lastChangeAt: 0
      };

      let score = 0;
      let cleared = 0;
      let missed = 0;
      let totalCharsTyped = 0;
      let correctCharsTyped = 0;

      function isMobileInputMode() {
        return mobileQuery.matches;
      }

      function getSpawnSpeed() {
        const baseSpeed = 24 + Math.random() * 14;
        return isMobileInputMode() ? baseSpeed * 0.375 : baseSpeed;
      }

      function clearKeyboardPrompt() {
        keyboardBadge.classList.remove('is-prompt');
      }

      function showKeyboardPrompt(duration = 1200) {
        if (!isMobileInputMode()) return;
        if (keyboardPromptTimer) {
          window.clearTimeout(keyboardPromptTimer);
          keyboardPromptTimer = 0;
        }

        keyboardBadge.classList.add('is-prompt');
        keyboardPromptTimer = window.setTimeout(() => {
          keyboardPromptTimer = 0;
          clearKeyboardPrompt();
        }, duration);
      }

      function clearTransientProgress() {
        transientProgressMessage = '';
        progressInfo.classList.remove('is-feedback');
        progressInfo.removeAttribute('data-tone');
      }

      function showTransientProgress(message, tone = 'success', duration = 1000) {
        if (transientProgressTimer) {
          window.clearTimeout(transientProgressTimer);
          transientProgressTimer = 0;
        }

        transientProgressMessage = message;
        progressInfo.textContent = message;
        progressInfo.classList.add('is-feedback');
        progressInfo.dataset.tone = tone;

        transientProgressTimer = window.setTimeout(() => {
          transientProgressTimer = 0;
          clearTransientProgress();
          updateTypingStatus();
        }, duration);
      }

      function getGameWidth() {
        return game.clientWidth || window.innerWidth;
      }

      function getGameHeight() {
        return game.clientHeight || window.innerHeight;
      }

      function getVisualViewportBottom() {
        return window.visualViewport
          ? window.visualViewport.offsetTop + window.visualViewport.height
          : getGameHeight();
      }

      function resetMobileKeyboardFloorState(now = performance.now()) {
        mobileKeyboardFloorState = {
          phase: 'closed',
          stableBottom: null,
          lastBottom: getVisualViewportBottom(),
          lastChangeAt: now
        };
      }

      function updateMobileKeyboardFloorState(now = performance.now()) {
        if (!isMobileInputMode()) {
          resetMobileKeyboardFloorState(now);
          return;
        }

        const viewportBottom = getVisualViewportBottom();
        const keyboardInset = getGameHeight() - viewportBottom;
        const keyboardLikelyOpen = keyboardInset >= MOBILE_KEYBOARD_OPEN_THRESHOLD;

        if (!keyboardLikelyOpen) {
          mobileKeyboardFloorState.phase = 'closed';
          mobileKeyboardFloorState.stableBottom = null;
          mobileKeyboardFloorState.lastBottom = viewportBottom;
          mobileKeyboardFloorState.lastChangeAt = now;
          return;
        }

        if (
          mobileKeyboardFloorState.lastBottom === null
          || Math.abs(viewportBottom - mobileKeyboardFloorState.lastBottom) > MOBILE_KEYBOARD_POSITION_TOLERANCE
        ) {
          mobileKeyboardFloorState.lastBottom = viewportBottom;
          mobileKeyboardFloorState.lastChangeAt = now;
          mobileKeyboardFloorState.phase = 'opening';
        } else if (mobileKeyboardFloorState.phase === 'closed') {
          mobileKeyboardFloorState.phase = 'opening';
        }

        if (now - mobileKeyboardFloorState.lastChangeAt >= MOBILE_KEYBOARD_SETTLE_MS) {
          mobileKeyboardFloorState.phase = 'open';
          mobileKeyboardFloorState.stableBottom = viewportBottom;
        }
      }

      function getVisibleFloorTop() {
        const groundTop = getGameHeight() - GROUND_HEIGHT;
        if (!isMobileInputMode()) return groundTop;

        updateMobileKeyboardFloorState();
        if (mobileKeyboardFloorState.phase !== 'open' || mobileKeyboardFloorState.stableBottom === null) {
          return groundTop;
        }

        return Math.min(groundTop, mobileKeyboardFloorState.stableBottom);
      }

      function randomSentence() {
        return sentenceBank[Math.floor(Math.random() * sentenceBank.length)];
      }

      function parseSentenceText(rawText) {
        const normalized = String(rawText || '').replace(/\r/g, '\n');
        const lineBased = normalized
          .split('\n')
          .map(line => line.trim())
          .filter(Boolean);

        if (lineBased.length > 1) return lineBased;

        return normalized
          .split(/(?<=[.!?])\s+/)
          .map(line => line.trim())
          .filter(Boolean);
      }

      function refreshSentenceBankStatus(message) {
        sentenceBankStatus.textContent = message;
      }

      function setGameplayHudState(isPlaying) {
        hud.classList.toggle('is-playing', isPlaying);
      }

      function setConfigMenuOpen(nextOpen) {
        configMenu.classList.toggle('open', nextOpen);
        menuBtn.setAttribute('aria-expanded', nextOpen ? 'true' : 'false');
      }

      function closeConfigMenu() {
        setConfigMenuOpen(false);
      }

      function toggleConfigMenu() {
        setConfigMenuOpen(!configMenu.classList.contains('open'));
      }

      async function refreshGameplaySentence() {
        if (!running) {
          renderScene();
          return;
        }
        gameToken += 1;
        sentences = [];
        activeSentenceId = null;
        clearInput();
        chooseActiveSentence();
        renderScene();
        await ensureSingleSentence();
        focusTyping();
      }

      async function useSentenceBank(nextBank, message) {
        if (!Array.isArray(nextBank) || nextBank.length === 0) return false;
        sentenceBank = [...nextBank];
        refreshSentenceBankStatus(message);
        await refreshGameplaySentence();
        return true;
      }

      async function applyCustomSentences(rawText, sourceLabel = 'custom text') {
        const parsed = parseSentenceText(rawText);
        if (parsed.length === 0) {
          refreshSentenceBankStatus('No valid sentences found. Paste one sentence per line or upload a text file.');
          return false;
        }
        customSentenceInput.value = parsed.join('\n');
        return useSentenceBank(parsed, `Using ${parsed.length} custom sentence${parsed.length === 1 ? '' : 's'} from ${sourceLabel}.`);
      }

      async function resetSentenceBank() {
        customSentenceInput.value = '';
        sentenceFileInput.value = '';
        await useSentenceBank(DEFAULT_SENTENCE_BANK, 'Using the default sentence set.');
      }

      function dpr() {
        return window.devicePixelRatio || 1;
      }

      function commonPrefixLength(expected, typed) {
        const max = Math.min(expected.length, typed.length);
        let i = 0;
        while (i < max && expected[i] === typed[i]) i += 1;
        return i;
      }

      function createWordParts(text) {
        const parts = [];
        const regex = /\S+|\s+/g;
        let match;

        while ((match = regex.exec(text))) {
          const chunk = match[0];
          parts.push({
            text: chunk,
            start: match.index,
            end: match.index + chunk.length,
            isWord: /\S/.test(chunk)
          });
        }

        return parts;
      }

      function getHighlightState(text, typed, parts) {
        const safeTyped = typed || '';
        const typedEnd = Math.min(text.length, safeTyped.length);
        const correct = commonPrefixLength(text, safeTyped);
        let completedWords = 0;

        for (const part of parts) {
          if (part.isWord && correct >= part.end) completedWords += 1;
        }

        return { correct, typedEnd, completedWords };
      }

      function getGrade(accuracy, clearedCount, missedCount) {
        if (missedCount >= MAX_MISSED) {
          if (accuracy >= 90 && clearedCount >= 8) return 'B';
          if (accuracy >= 80 && clearedCount >= 5) return 'C';
          if (accuracy >= 70 && clearedCount >= 3) return 'D';
          return 'F';
        }
        if (accuracy >= 97 && clearedCount >= 12) return 'A+';
        if (accuracy >= 93 && clearedCount >= 10) return 'A';
        if (accuracy >= 88 && clearedCount >= 8) return 'B';
        if (accuracy >= 78 && clearedCount >= 5) return 'C';
        if (accuracy >= 65) return 'D';
        return 'F';
      }

      function currentAccuracy() {
        return totalCharsTyped === 0 ? 100 : Math.round((correctCharsTyped / totalCharsTyped) * 100);
      }

      function updateStats() {
        const accuracy = currentAccuracy();
        scoreEl.textContent = score;
        clearedEl.textContent = cleared;
        missedEl.textContent = missed;
        accuracyEl.textContent = `${accuracy}%`;
        gradeEl.textContent = getGrade(accuracy, cleared, missed);
      }

      function roundRectPath(ctx, x, y, w, h, r) {
        const radius = Math.min(r, w / 2, h / 2);
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.arcTo(x + w, y, x + w, y + h, radius);
        ctx.arcTo(x + w, y + h, x, y + h, radius);
        ctx.arcTo(x, y + h, x, y, radius);
        ctx.arcTo(x, y, x + w, y, radius);
        ctx.closePath();
      }

      function syncCanvasSize() {
        const ratio = dpr();
        const width = getGameWidth();
        const height = getGameHeight();
        sceneCanvas.width = Math.round(width * ratio);
        sceneCanvas.height = Math.round(height * ratio);
        sceneCanvas.style.width = `${width}px`;
        sceneCanvas.style.height = `${height}px`;
        sceneCtx.setTransform(ratio, 0, 0, ratio, 0, 0);
        renderScene();
      }

      function getSentenceBoxWidth() {
        const width = getGameWidth();
        return Math.max(250, Math.min(420, width - 30, Math.round(width * 0.34 + 100)));
      }

      function getSentenceTextWidth(boxWidth) {
        return Math.max(140, boxWidth - BOX_PADDING_X * 2);
      }

      function layoutSentence(sentence) {
        sentence.boxWidth = getSentenceBoxWidth();
        sentence.layout = layoutWithLines(sentence.prepared, getSentenceTextWidth(sentence.boxWidth), SENTENCE_LINE_HEIGHT);
        sentence.boxHeight = BOX_PADDING_Y * 2 + sentence.layout.height;
      }

      async function buildSentence(text) {
        const prepared = await Promise.resolve(prepareWithSegments(text, SENTENCE_FONT));
        const parts = createWordParts(text);
        const wordCount = parts.filter(part => part.isWord).length;
        const width = getGameWidth();

        const sentence = {
          id: nextId++,
          text,
          prepared,
          parts,
          wordCount,
          hiddenIndices: new Set(),
          layout: null,
          boxWidth: 0,
          boxHeight: 0,
          x: 0,
          y: -20,
          speed: getSpawnSpeed(),
          hitGround: false
        };

        layoutSentence(sentence);
        const maxLeft = Math.max(10, width - sentence.boxWidth - 10);
        sentence.x = maxLeft <= 10 ? 10 : 10 + Math.random() * (maxLeft - 10);
        return sentence;
      }

      function getActiveSentence() {
        return sentences.find(sentence => sentence.id === activeSentenceId && !sentence.hitGround) || null;
      }

      function focusTyping() {
        if (!running || overlay.style.display === 'flex') return;
        if (isMobileInputMode()) {
          input.removeAttribute('readonly');
          input.click();
        }
        input.focus({ preventScroll: true });
        const end = input.value.length;
        if (typeof input.setSelectionRange === 'function') {
          input.setSelectionRange(end, end);
        }
      }

      function updateTypingStatus() {
        const target = getActiveSentence();

        if (transientProgressMessage) return;

        if (!target) {
          progressInfo.textContent = running
            ? 'Next sentence is spawning.'
            : isMobileInputMode()
              ? 'Tap Start, then tap anywhere to type.'
              : 'Click Start, then type in the box.';
          return;
        }

        const { completedWords } = getHighlightState(target.text, typedValue, target.parts);
        const typedChars = Math.min(typedValue.length, target.text.length);
        progressInfo.textContent = `${completedWords}/${target.wordCount} words • ${typedChars}/${target.text.length} chars`;
      }

      function updateTypingPrompt() {
        const hasTarget = Boolean(getActiveSentence());
        if (!hasTarget && !running) {
          targetInfo.textContent = 'Click Start, then type the highlighted falling sentence.';
          return;
        }
        if (!hasTarget && running) {
          targetInfo.textContent = 'Preparing the next sentence...';
          return;
        }
        targetInfo.textContent = isMobileInputMode()
          ? 'Type on the highlighted falling sentence. Tap the game if the keyboard closes.'
          : 'Type in the box and watch the falling sentence update live.';
      }

      function chooseActiveSentence() {
        const alive = sentences.filter(sentence => !sentence.hitGround);
        if (alive.length === 0) {
          activeSentenceId = null;
          updateTypingPrompt();
          updateTypingStatus();
          return null;
        }

        activeSentenceId = alive[0].id;
        updateTypingPrompt();
        updateTypingStatus();
        return alive[0];
      }

      function clearInput() {
        typedValue = '';
        input.value = '';
        lastInputValue = '';
        updateTypingStatus();
      }

      function normalizeInputValue(value, maxLength) {
        return String(value || '')
          .replace(/[\r\n]/g, '')
          .slice(0, maxLength);
      }

      function syncInputValue() {
        const target = getActiveSentence();
        if (!target) {
          input.value = '';
          typedValue = '';
          return;
        }

        const normalized = normalizeInputValue(input.value, target.text.length);
        if (input.value !== normalized) input.value = normalized;
        typedValue = normalized;
        const end = normalized.length;
        if (typeof input.setSelectionRange === 'function') {
          input.setSelectionRange(end, end);
        }
      }

      async function ensureSingleSentence() {
        if (!running) return;
        if (sentences.some(sentence => !sentence.hitGround)) return;
        const token = gameToken;
        const sentence = await buildSentence(randomSentence());
        if (token !== gameToken || !running) return;
        sentences = [sentence];
        activeSentenceId = sentence.id;
        clearInput();
        chooseActiveSentence();
        renderScene();
      }

      function handleSuccessfulClear(target) {
        score += 100;
        cleared += 1;
        sentences = sentences.filter(sentence => sentence.id !== target.id);
        if (activeSentenceId === target.id) activeSentenceId = null;
        clearInput();
        updateStats();
        showTransientProgress('Cleared +100', 'success');
        chooseActiveSentence();
        renderScene();
        focusTyping();
        void ensureSingleSentence();
      }

      function recordTypingDelta(targetText, value) {
        if (value.length <= lastInputValue.length) {
          lastInputValue = value;
          return;
        }

        for (let i = lastInputValue.length; i < value.length; i += 1) {
          totalCharsTyped += 1;
          if (value[i] === targetText[i]) correctCharsTyped += 1;
        }

        lastInputValue = value;
      }

      function removeSentenceById(id) {
        sentences = sentences.filter(sentence => sentence.id !== id);
        if (activeSentenceId === id) activeSentenceId = null;
      }

      function measureGlyphWidth(ctx, glyph) {
        return Math.max(ctx.measureText(glyph || ' ').width, glyph === ' ' ? 8 : 0);
      }

      function buildHiddenIndexSet(count) {
        const hiddenIndices = new Set();
        for (let index = 0; index < count; index += 1) {
          hiddenIndices.add(index);
        }
        return hiddenIndices;
      }

      function isWordCharacterIndex(parts, charIndex) {
        for (const part of parts) {
          if (charIndex < part.start) return false;
          if (charIndex < part.end) return part.isWord;
        }
        return false;
      }

      function isWrongCharacterIndex(sentence, charIndex, correct, typedEnd) {
        return charIndex >= correct
          && charIndex < typedEnd
          && isWordCharacterIndex(sentence.parts, charIndex);
      }

      function isPendingSpaceCharacter(sentence, charIndex, correct) {
        return charIndex === correct && sentence.text[charIndex] === ' ';
      }

      function drawRangeHighlight(ctx, lineText, lineStart, rangeStart, rangeEnd, startX, lineY, lineHeight, fillStyle, textStyle) {
        const start = Math.max(lineStart, rangeStart);
        const end = Math.min(lineStart + lineText.length, rangeEnd);
        if (end <= start) return;

        const localStart = start - lineStart;
        const localEnd = end - lineStart;
        const leading = lineText.slice(0, localStart);
        const segment = lineText.slice(localStart, localEnd);
        const offset = ctx.measureText(leading).width;
        const width = ctx.measureText(segment).width;

        ctx.fillStyle = fillStyle;
        ctx.fillRect(startX + offset - 3, lineY + 3, width + 6, lineHeight - 8);
        ctx.fillStyle = textStyle;
        ctx.fillText(segment, startX + offset, lineY);
      }

      function getCharacterAnchor(sentence, charIndex) {
        if (!sentence || !sentence.layout || charIndex < 0 || charIndex >= sentence.text.length) return null;

        sceneCtx.save();
        sceneCtx.font = SENTENCE_FONT;
        sceneCtx.textBaseline = 'top';

        let cursor = 0;
        for (let lineIndex = 0; lineIndex < sentence.layout.lines.length; lineIndex += 1) {
          const lineText = sentence.layout.lines[lineIndex].text;
          const lineEnd = cursor + lineText.length;
          if (charIndex >= lineEnd) {
            cursor = lineEnd;
            continue;
          }

          let offsetX = 0;
          for (let localIndex = 0; localIndex < lineText.length; localIndex += 1) {
            const glyph = lineText[localIndex];
            const width = measureGlyphWidth(sceneCtx, glyph);
            if (cursor + localIndex === charIndex) {
              sceneCtx.restore();
              return {
                x: sentence.x + BOX_PADDING_X + offsetX + width * 0.5,
                y: sentence.y + BOX_PADDING_Y + lineIndex * SENTENCE_LINE_HEIGHT + SENTENCE_LINE_HEIGHT * 0.5,
                glyph
              };
            }
            offsetX += width;
          }
        }

        sceneCtx.restore();
        return null;
      }

      function spawnDandelionBurst(sentence, charIndex) {
        const anchor = getCharacterAnchor(sentence, charIndex);
        if (!anchor) return;

        const glyph = anchor.glyph && anchor.glyph !== ' ' ? anchor.glyph : '';
        const burstSize = glyph ? 10 + Math.floor(Math.random() * 4) : 7;

        if (glyph) {
          dandelionParticles.push({
            kind: 'glyph',
            x: anchor.x,
            y: anchor.y,
            vx: (Math.random() - 0.5) * 16,
            vy: -20 - Math.random() * 10,
            rotation: (Math.random() - 0.5) * 0.35,
            spin: (Math.random() - 0.5) * 1.8,
            scale: 1,
            growth: 1.1 + Math.random() * 0.35,
            life: 0,
            maxLife: 0.34 + Math.random() * 0.10,
            glyph
          });
        }

        for (let i = 0; i < burstSize; i += 1) {
          const angle = -Math.PI / 2 + (Math.random() - 0.5) * 1.6;
          const speed = 26 + Math.random() * 34;
          dandelionParticles.push({
            kind: 'seed',
            x: anchor.x + (Math.random() - 0.5) * 5,
            y: anchor.y + (Math.random() - 0.5) * 4,
            vx: Math.cos(angle) * speed + (Math.random() - 0.5) * 12,
            vy: Math.sin(angle) * speed - 10 - Math.random() * 10,
            sway: 9 + Math.random() * 12,
            phase: Math.random() * Math.PI * 2,
            rotation: (Math.random() - 0.5) * 0.8,
            spin: (Math.random() - 0.5) * 1.5,
            stem: 5 + Math.random() * 4.5,
            tuft: 4 + Math.random() * 2.5,
            life: 0,
            maxLife: 0.7 + Math.random() * 0.45
          });
        }
      }

      function syncMatchedCharacterEffects(sentence, previousValue, nextValue) {
        if (!sentence) return;

        const previousCorrect = commonPrefixLength(sentence.text, previousValue);
        const nextCorrect = commonPrefixLength(sentence.text, nextValue);

        if (nextCorrect > previousCorrect) {
          for (let index = previousCorrect; index < nextCorrect; index += 1) {
            spawnDandelionBurst(sentence, index);
          }
        }

        sentence.hiddenIndices = buildHiddenIndexSet(nextCorrect);
      }

      function updateDandelionParticles(dt) {
        if (dandelionParticles.length === 0) return;

        dandelionParticles = dandelionParticles.filter(particle => {
          particle.life += dt;
          if (particle.kind === 'glyph') {
            particle.x += particle.vx * dt;
            particle.y += particle.vy * dt;
            particle.rotation += particle.spin * dt;
            particle.scale += particle.growth * dt;
            return particle.life < particle.maxLife;
          }

          const sway = Math.sin(particle.phase + particle.life * 8) * particle.sway;
          particle.x += (particle.vx + sway) * dt;
          particle.y += particle.vy * dt;
          particle.vy += DANDELION_GRAVITY * dt;
          particle.vx += DANDELION_GUST * 0.02 * dt;
          particle.rotation += particle.spin * dt;
          return particle.life < particle.maxLife;
        });
      }

      function drawSeedParticle(ctx, particle) {
        const t = particle.life / particle.maxLife;
        const alpha = Math.max(0, 1 - t);

        ctx.save();
        ctx.translate(particle.x, particle.y);
        ctx.rotate(particle.rotation);
        ctx.lineCap = 'round';

        ctx.strokeStyle = `rgba(244, 196, 48, ${0.96 * alpha})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(0, particle.stem);
        ctx.moveTo(0, 0);
        ctx.lineTo(-particle.tuft, -particle.tuft * 0.95);
        ctx.moveTo(0, 0);
        ctx.lineTo(-particle.tuft * 0.55, -particle.tuft * 1.15);
        ctx.moveTo(0, 0);
        ctx.lineTo(0, -particle.tuft * 1.25);
        ctx.moveTo(0, 0);
        ctx.lineTo(particle.tuft * 0.55, -particle.tuft * 1.15);
        ctx.moveTo(0, 0);
        ctx.lineTo(particle.tuft, -particle.tuft * 0.95);
        ctx.stroke();

        ctx.fillStyle = `rgba(201, 125, 20, ${0.72 * alpha})`;
        ctx.beginPath();
        ctx.arc(0, particle.stem, 1.4, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawGlyphParticle(ctx, particle) {
        const t = particle.life / particle.maxLife;
        const alpha = Math.max(0, 1 - t);

        ctx.save();
        ctx.translate(particle.x, particle.y);
        ctx.rotate(particle.rotation);
        ctx.scale(particle.scale, particle.scale);
        ctx.font = SENTENCE_FONT;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.lineWidth = 1.4;
        ctx.strokeStyle = `rgba(165, 199, 164, ${0.4 * alpha})`;
        ctx.fillStyle = `rgba(255, 255, 255, ${0.85 * alpha})`;
        ctx.strokeText(particle.glyph, 0, 0);
        ctx.fillText(particle.glyph, 0, 0);
        ctx.restore();
      }

      function renderDandelionParticles(ctx) {
        if (dandelionParticles.length === 0) return;
        for (const particle of dandelionParticles) {
          if (particle.kind === 'glyph') {
            drawGlyphParticle(ctx, particle);
            continue;
          }
          drawSeedParticle(ctx, particle);
        }
      }

      function drawWrappedText(ctx, lines, sentence, typed, startX, startY, lineHeight, palette) {
        const { correct, typedEnd } = getHighlightState(sentence.text, typed, sentence.parts);
        let cursor = 0;

        ctx.textBaseline = 'top';

        for (let index = 0; index < lines.length; index += 1) {
          const line = lines[index];
          const lineText = line.text;
          const lineY = startY + index * lineHeight;
          const lineStart = cursor;
          let cursorX = startX;

          for (let localIndex = 0; localIndex < lineText.length; localIndex += 1) {
            const charIndex = lineStart + localIndex;
            const glyph = lineText[localIndex];
            const glyphWidth = measureGlyphWidth(ctx, glyph);
            const isHidden = sentence.hiddenIndices.has(charIndex);

            if (!isHidden && isWrongCharacterIndex(sentence, charIndex, correct, typedEnd)) {
              ctx.fillStyle = palette.wrongBg;
              ctx.fillRect(cursorX - 3, lineY + 3, glyphWidth + 6, lineHeight - 8);
            }

            if (!isHidden && isPendingSpaceCharacter(sentence, charIndex, correct)) {
              ctx.fillStyle = palette.pendingSpace;
              ctx.fillText('·', cursorX, lineY);
            }

            if (!isHidden && glyph !== ' ') {
              ctx.fillStyle = palette.text;
              if (isWrongCharacterIndex(sentence, charIndex, correct, typedEnd)) {
                ctx.fillStyle = palette.wrongText;
              }
              ctx.fillText(glyph, cursorX, lineY);
            }

            cursorX += glyphWidth;
          }

          cursor += lineText.length;
        }
      }

      function renderScene() {
        const width = getGameWidth();
        const height = getGameHeight();
        sceneCtx.clearRect(0, 0, width, height);
        sceneCtx.font = SENTENCE_FONT;
        sceneCtx.textBaseline = 'top';

        const active = getActiveSentence();
        for (const sentence of sentences) {
          const isActive = active && sentence.id === active.id;
          const fill = sentence.hitGround
            ? sentencePalette.hitFill
            : isActive
              ? sentencePalette.activeFill
              : sentencePalette.fill;
          const stroke = sentence.hitGround
            ? sentencePalette.hitBorder
            : isActive
              ? sentencePalette.activeBorder
              : sentencePalette.border;

          sceneCtx.save();
          sceneCtx.shadowColor = isActive ? 'rgba(30, 136, 229, 0.20)' : 'rgba(0, 0, 0, 0.10)';
          sceneCtx.shadowBlur = isActive ? 18 : 12;
          sceneCtx.shadowOffsetY = 6;
          roundRectPath(sceneCtx, sentence.x, sentence.y, sentence.boxWidth, sentence.boxHeight, 14);
          sceneCtx.fillStyle = fill;
          sceneCtx.fill();
          sceneCtx.shadowColor = 'transparent';
          sceneCtx.lineWidth = isActive ? 2.5 : 1.2;
          sceneCtx.strokeStyle = stroke;
          sceneCtx.stroke();
          sceneCtx.restore();

          sceneCtx.font = SENTENCE_FONT;
          drawWrappedText(
            sceneCtx,
            sentence.layout.lines,
            sentence,
            isActive ? typedValue : '',
            sentence.x + BOX_PADDING_X,
            sentence.y + BOX_PADDING_Y,
            SENTENCE_LINE_HEIGHT,
            sentencePalette
          );
        }

        renderDandelionParticles(sceneCtx);
      }

      function handleLiveTyping() {
        const target = getActiveSentence();
        if (!target) return;

        const previous = typedValue;
        syncInputValue();
        if (typedValue === previous && typedValue !== '') {
          updateTypingStatus();
          return;
        }

        syncMatchedCharacterEffects(target, previous, typedValue);
        recordTypingDelta(target.text, typedValue);
        updateStats();
        updateTypingStatus();
        renderScene();

        if (typedValue === target.text) {
          handleSuccessfulClear(target);
        }
      }

      function applyDetachedKey(event) {
        const target = getActiveSentence();
        if (!target) return false;

        if (event.key === 'Backspace') {
          input.value = input.value.slice(0, -1);
          return true;
        }

        if (event.key.length === 1) {
          input.value = normalizeInputValue(`${input.value}${event.key}`, target.text.length);
          return true;
        }

        return false;
      }

      function endGame() {
        running = false;
        dandelionParticles = [];
        resetMobileKeyboardFloorState();
        if (keyboardPromptTimer) {
          window.clearTimeout(keyboardPromptTimer);
          keyboardPromptTimer = 0;
        }
        clearKeyboardPrompt();
        setGameplayHudState(false);
        overlay.style.display = 'flex';
        const accuracy = currentAccuracy();
        const grade = getGrade(accuracy, cleared, missed);
        results.innerHTML = `
          <div><strong>Final Score:</strong> ${score}</div>
          <div><strong>Sentences Cleared:</strong> ${cleared}</div>
          <div><strong>Sentences Missed:</strong> ${missed}</div>
          <div><strong>Accuracy:</strong> ${accuracy}%</div>
          <div><strong>Grade:</strong> ${grade}</div>
        `;
      }

      function resetGame() {
        gameToken += 1;
        sentences = [];
        activeSentenceId = null;
        running = false;
        lastTime = 0;
        nextId = 1;
        dandelionParticles = [];
        resetMobileKeyboardFloorState();
        clearInput();
        score = 0;
        cleared = 0;
        missed = 0;
        totalCharsTyped = 0;
        correctCharsTyped = 0;
        overlay.style.display = 'none';
        if (transientProgressTimer) {
          window.clearTimeout(transientProgressTimer);
          transientProgressTimer = 0;
        }
        if (keyboardPromptTimer) {
          window.clearTimeout(keyboardPromptTimer);
          keyboardPromptTimer = 0;
        }
        clearTransientProgress();
        clearKeyboardPrompt();
        setGameplayHudState(false);
        updateTypingPrompt();
        updateStats();
        renderScene();
      }

      function update(dt) {
        const visibleFloorTop = getVisibleFloorTop();
        updateDandelionParticles(dt);

        for (const sentence of sentences) {
          if (sentence.hitGround) continue;
          sentence.y += sentence.speed * dt;
          if (sentence.y + sentence.boxHeight >= visibleFloorTop) {
            sentence.hitGround = true;
            missed += 1;
            updateStats();
            showTransientProgress('Sentence touched down', 'danger');
            if (sentence.id === activeSentenceId) {
              activeSentenceId = null;
              clearInput();
            }
            const token = gameToken;
            window.setTimeout(() => {
              if (token !== gameToken) return;
              removeSentenceById(sentence.id);
              chooseActiveSentence();
              renderScene();
              void ensureSingleSentence();
            }, 250);
          }
        }

        if (missed >= MAX_MISSED) endGame();
      }

      function gameLoop(timestamp) {
        if (!running) return;
        if (!lastTime) lastTime = timestamp;

        const dtMs = timestamp - lastTime;
        const dt = dtMs / 1000;
        lastTime = timestamp;

        update(dt);
        renderScene();
        if (running) window.requestAnimationFrame(gameLoop);
      }

      function startGame() {
        if (running) return;
        running = true;
        resetMobileKeyboardFloorState();
        overlay.style.display = 'none';
        closeConfigMenu();
        setGameplayHudState(true);
        showTransientProgress('TAP TO TYPE', 'prompt', 1200);
        showKeyboardPrompt();
        chooseActiveSentence();
        void ensureSingleSentence();
        focusTyping();
        window.requestAnimationFrame(gameLoop);
      }

      function shouldRefocusForKey(event) {
        if (event.metaKey || event.ctrlKey || event.altKey) return false;
        if (event.key.length === 1) return true;
        return event.key === 'Backspace' || event.key === 'Enter';
      }

      function isEditingCustomSentences() {
        const active = document.activeElement;
        return active === customSentenceInput || active === sentenceFileInput;
      }

      menuBtn.addEventListener('click', event => {
        event.stopPropagation();
        toggleConfigMenu();
      });

      configMenu.addEventListener('click', event => {
        event.stopPropagation();
      });

      applySentenceBankBtn.addEventListener('click', async () => {
        await applyCustomSentences(customSentenceInput.value, 'pasted text');
        closeConfigMenu();
      });

      resetSentenceBankBtn.addEventListener('click', async () => {
        await resetSentenceBank();
        closeConfigMenu();
      });

      sentenceFileInput.addEventListener('change', async event => {
        const [file] = Array.from(event.target.files || []);
        if (!file) return;
        try {
          const text = await file.text();
          await applyCustomSentences(text, file.name || 'uploaded file');
          closeConfigMenu();
        } catch (error) {
          console.error(error);
          refreshSentenceBankStatus('Could not read that file. Please upload a plain text file.');
        }
      });

      document.addEventListener('pointerdown', event => {
        if (!configMenu.classList.contains('open')) return;
        if (configMenuWrap.contains(event.target)) return;
        closeConfigMenu();
      });

      document.addEventListener('keydown', event => {
        if (event.key === 'Escape') closeConfigMenu();
      });

      startBtn.addEventListener('click', startGame);

      restartBtn.addEventListener('click', () => {
        resetGame();
        startGame();
      });

      playAgainBtn.addEventListener('click', () => {
        resetGame();
        startGame();
      });

      input.addEventListener('input', () => {
        if (!running) return;
        handleLiveTyping();
      });

      input.addEventListener('keydown', event => {
        if (event.key === 'Enter') {
          event.preventDefault();
        }
      });

      window.addEventListener('keydown', event => {
        if (!running || overlay.style.display === 'flex') return;
        if (isEditingCustomSentences()) return;
        if (!shouldRefocusForKey(event)) return;

        if (document.activeElement !== input) {
          const applied = applyDetachedKey(event);
          if (applied || event.key === ' ' || event.key === 'Backspace') {
            event.preventDefault();
          }
          focusTyping();
          if (applied) handleLiveTyping();
        }
      });

      game.addEventListener('pointerdown', () => {
        if (!running || overlay.style.display === 'flex') return;
        if (!isMobileInputMode()) return;
        focusTyping();
      });

      typingBar.addEventListener('pointerdown', () => {
        if (!running || overlay.style.display === 'flex') return;
        if (!isMobileInputMode()) return;
        focusTyping();
      });

      window.addEventListener('resize', () => {
        syncCanvasSize();
        const width = getGameWidth();
        for (const sentence of sentences) {
          layoutSentence(sentence);
          sentence.x = Math.min(sentence.x, Math.max(10, width - sentence.boxWidth - 10));
        }
        updateTypingPrompt();
        updateTypingStatus();
        renderScene();
      });

      const syncMobileMode = () => {
        resetMobileKeyboardFloorState();
        updateTypingPrompt();
        updateTypingStatus();
      };

      const syncMobileKeyboardFloor = () => {
        updateMobileKeyboardFloorState();
      };

      if (typeof mobileQuery.addEventListener === 'function') {
        mobileQuery.addEventListener('change', syncMobileMode);
      } else if (typeof mobileQuery.addListener === 'function') {
        mobileQuery.addListener(syncMobileMode);
      }

      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', syncMobileKeyboardFloor);
        window.visualViewport.addEventListener('scroll', syncMobileKeyboardFloor);
      }

      resetMobileKeyboardFloorState();
      updateTypingPrompt();
      updateTypingStatus();
      updateStats();
      syncCanvasSize();
      renderScene();
    })();
  </script>
</body>
</html>
