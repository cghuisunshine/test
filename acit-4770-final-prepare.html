<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ACIT 4770 Final Prepare</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      color-scheme: dark;
      --bg: #101010;
      --panel: #181818;
      --panel-2: #222222;
      --border: #343434;
      --text: #f3f3f3;
      --muted: #a6a6a6;
      --accent: #f5c542;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Avenir Next", "Helvetica Neue", Helvetica, sans-serif;
    }

    body {
      overflow: hidden;
    }

    .deck {
      display: grid;
      grid-template-rows: 56px 1fr 96px;
      min-height: 100vh;
      min-height: 100dvh;
    }

    .topbar,
    .filmstrip {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--panel);
      border-color: var(--border);
      border-style: solid;
    }

    .topbar {
      justify-content: space-between;
      padding: 0 18px;
      border-width: 0 0 1px;
    }

    .title {
      margin: 0;
      font-size: 15px;
      font-weight: 650;
      line-height: 1.2;
    }

    .status {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .stage {
      position: relative;
      display: grid;
      place-items: center;
      height: calc(100vh - 152px);
      height: calc(100dvh - 152px);
      min-height: 0;
      padding: 24px 72px;
      overflow: hidden;
    }

    .slide {
      display: none;
      width: 100%;
      height: 100%;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }

    .slide.is-active {
      display: flex;
    }

    .slide img {
      display: block;
      width: auto;
      max-width: 100%;
      height: auto;
      max-height: 100%;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      background: #000;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.34);
    }

    .nav-button {
      position: absolute;
      top: 50%;
      display: grid;
      place-items: center;
      width: 44px;
      height: 44px;
      padding: 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      font-size: 26px;
      line-height: 1;
      transform: translateY(-50%);
      transition: background-color 140ms ease, border-color 140ms ease;
    }

    .nav-button:hover {
      background: var(--panel-2);
      border-color: #4a4a4a;
    }

    .nav-button:focus-visible,
    .thumb:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .nav-button.prev {
      left: 18px;
    }

    .nav-button.next {
      right: 18px;
    }

    .filmstrip {
      justify-content: center;
      padding: 12px 18px;
      border-width: 1px 0 0;
      overflow-x: auto;
      overscroll-behavior-x: contain;
    }

    .thumb {
      flex: 0 0 auto;
      width: 56px;
      height: 70px;
      padding: 0;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: #0a0a0a;
      cursor: pointer;
      opacity: 0.62;
      transition: opacity 140ms ease, border-color 140ms ease;
    }

    .thumb:hover,
    .thumb.is-active {
      opacity: 1;
      border-color: var(--accent);
    }

    .thumb img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 5px;
    }

    @media (max-width: 760px) {
      html,
      body {
        height: 100%;
        overscroll-behavior: none;
      }

      body {
        overflow: hidden;
        background: #000;
      }

      .deck {
        display: block;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        min-height: 0;
      }

      .stage {
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        padding: 0;
        background: #000;
        touch-action: pan-y;
      }

      .topbar,
      .filmstrip,
      .nav-button {
        display: none;
      }

      .slide {
        width: 100vw;
        height: 100vh;
        height: 100dvh;
      }

      .slide img {
        width: 100vw;
        max-width: none;
        height: 100vh;
        height: 100dvh;
        max-height: none;
        object-fit: contain;
        border: 0;
        border-radius: 0;
        box-shadow: none;
      }
    }
  </style>
</head>
<body>
  <main class="deck" aria-label="ACIT 4770 final prepare slide deck">
    <header class="topbar">
      <h1 class="title">ACIT 4770 final prepare</h1>
      <div class="status" id="status" aria-live="polite">1 / 6</div>
    </header>

    <section class="stage" aria-label="Slides">
      <button class="nav-button prev" type="button" aria-label="Previous slide" title="Previous slide">&lsaquo;</button>

      <figure class="slide is-active">
        <img src="assets/acit-4770-final-prepare-overview.png" alt="ACIT 4770 final prepare overview">
      </figure>
      <figure class="slide">
        <img src="assets/acit-4770-final-prepare-week-9-review.png" alt="ACIT 4770 final prepare week 9 review">
      </figure>
      <figure class="slide">
        <img src="assets/acit-4770-final-prepare-week-10-review.png" alt="ACIT 4770 final prepare week 10 review">
      </figure>
      <figure class="slide">
        <img src="assets/acit-4770-final-prepare-week-12-review.png" alt="ACIT 4770 final prepare week 12 review">
      </figure>
      <figure class="slide">
        <img src="assets/acit-4770-final-prepare-week-13-review.png" alt="ACIT 4770 final prepare week 13 review">
      </figure>
      <figure class="slide">
        <img src="assets/acit-4770-final-prepare-week-14-review.png" alt="ACIT 4770 final prepare week 14 review">
      </figure>

      <button class="nav-button next" type="button" aria-label="Next slide" title="Next slide">&rsaquo;</button>
    </section>

    <nav class="filmstrip" aria-label="Slide thumbnails">
      <button class="thumb is-active" type="button" aria-label="Show slide 1">
        <img src="assets/acit-4770-final-prepare-overview.png" alt="">
      </button>
      <button class="thumb" type="button" aria-label="Show slide 2">
        <img src="assets/acit-4770-final-prepare-week-9-review.png" alt="">
      </button>
      <button class="thumb" type="button" aria-label="Show slide 3">
        <img src="assets/acit-4770-final-prepare-week-10-review.png" alt="">
      </button>
      <button class="thumb" type="button" aria-label="Show slide 4">
        <img src="assets/acit-4770-final-prepare-week-12-review.png" alt="">
      </button>
      <button class="thumb" type="button" aria-label="Show slide 5">
        <img src="assets/acit-4770-final-prepare-week-13-review.png" alt="">
      </button>
      <button class="thumb" type="button" aria-label="Show slide 6">
        <img src="assets/acit-4770-final-prepare-week-14-review.png" alt="">
      </button>
    </nav>
  </main>

  <script>
    const slides = Array.from(document.querySelectorAll(".slide"));
    const thumbs = Array.from(document.querySelectorAll(".thumb"));
    const status = document.querySelector("#status");
    const previous = document.querySelector(".prev");
    const next = document.querySelector(".next");
    const stage = document.querySelector(".stage");
    let current = 0;
    let touchStartX = 0;
    let touchStartY = 0;

    function showSlide(index) {
      current = (index + slides.length) % slides.length;

      slides.forEach((slide, i) => {
        slide.classList.toggle("is-active", i === current);
      });

      thumbs.forEach((thumb, i) => {
        thumb.classList.toggle("is-active", i === current);
        thumb.setAttribute("aria-current", i === current ? "true" : "false");
      });

      status.textContent = `${current + 1} / ${slides.length}`;
    }

    previous.addEventListener("click", () => showSlide(current - 1));
    next.addEventListener("click", () => showSlide(current + 1));

    thumbs.forEach((thumb, index) => {
      thumb.addEventListener("click", () => showSlide(index));
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft") {
        showSlide(current - 1);
      }

      if (event.key === "ArrowRight" || event.key === " ") {
        event.preventDefault();
        showSlide(current + 1);
      }
    });

    stage.addEventListener("touchstart", (event) => {
      if (event.touches.length !== 1) {
        return;
      }

      touchStartX = event.touches[0].clientX;
      touchStartY = event.touches[0].clientY;
    }, { passive: true });

    stage.addEventListener("touchend", (event) => {
      const touch = event.changedTouches[0];
      const deltaX = touch.clientX - touchStartX;
      const deltaY = touch.clientY - touchStartY;
      const isHorizontalSwipe = Math.abs(deltaX) > 48 && Math.abs(deltaX) > Math.abs(deltaY) * 1.35;

      if (!isHorizontalSwipe) {
        return;
      }

      showSlide(deltaX < 0 ? current + 1 : current - 1);
    }, { passive: true });
  </script>
</body>
</html>
