<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>每日一题</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC",
        "Microsoft YaHei", Arial, sans-serif;
      background: #ffffff;
    }

    .top {
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0 16px;
      border-bottom: 1px solid #e5e7eb;
      background: #ffffff;
    }

    .title {
      font-size: 18px;
      font-weight: 800;
      white-space: nowrap;
    }

    .info {
      color: #667085;
      font-size: 14px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: right;
    }

    iframe {
      display: block;
      width: 100%;
      height: calc(100vh - 54px);
      border: 0;
      background: #ffffff;
    }

    @media (max-width: 600px) {
      .top {
        height: 48px;
        padding: 0 10px;
      }

      .title {
        font-size: 16px;
      }

      .info {
        font-size: 12px;
      }

      iframe {
        height: calc(100vh - 48px);
      }
    }
  </style>
</head>

<body>
  <div class="top">
    <div class="title">每日一题</div>
    <div class="info" id="info">Loading...</div>
  </div>

  <iframe id="questionFrame" title="今日题目"></iframe>

  <script>
    const QUESTIONS = [
    {
        "title": "求阴影部分面积",
        "url": "https://cghuisunshine.github.io/test/shaded_area_clean_toggle_answers.html"
    },
    {
        "title": "数字求值",
        "url": "https://cghuisunshine.github.io/test/shape_digit_puzzle_bilingual_two_methods.html"
    },
    {
        "title": "偶数填空",
        "url": "https://cghuisunshine.github.io/test/consecutive_even_numbers_bilingual_show_hide.html"
    },
    {
        "title": "求值",
        "url": "https://cghuisunshine.github.io/test/circle_equation_bilingual_with_visual_method2.html"
    },
    {
        "title": "简便运算",
        "url": "https://cghuisunshine.github.io/test/mental_math_shortcut_bilingual_three_methods.html"
    },
    {
        "title": "求值",
        "url": "https://cghuisunshine.github.io/test/find_A_B_bilingual_show_hide.html"
    },
    {
        "title": "方框代表几",
        "url": "https://cghuisunshine.github.io/test/fraction_box_bilingual_with_visual_method2.html"
    },
    {
        "title": "幻方",
        "url": "https://cghuisunshine.github.io/test/magic_square_bilingual_three_methods.html"
    },
    {
        "title": "数三角形",
        "url": "https://cghuisunshine.github.io/test/count_triangles_bilingual_show_hide.html"
    },
    {
        "title": "分数求和",
        "url": "https://cghuisunshine.github.io/test/fraction_sum_bilingual_show_hide.html"
    },
    {
        "title": "求阴影部分面积",
        "url": "https://cghuisunshine.github.io/test/shaded_semicircles_method1_only.html"
    },
    {
        "title": "多个5求和",
        "url": "https://cghuisunshine.github.io/test/repeated_5_sum_9_bilingual_three_methods_FIXED.html"
    },
    {
        "title": "求面积",
        "url": "https://cghuisunshine.github.io/test/overlapping_triangles_shaded_area_speak.html"
    },
    {
        "title": "平方和与根号运算",
        "url": "https://cghuisunshine.github.io/test/square_sum_root_2025_2026_solution2_one_image.html"
    }
];

    // Start date of the 14-question cycle: June 13, 2026.
    const BASE_DATE = new Date(2026, 5, 13);
    const MS_PER_DAY = 24 * 60 * 60 * 1000;

    function startOfLocalDay(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function getTodayQuestionIndex() {
      const today = startOfLocalDay(new Date());
      const days = Math.floor((today - BASE_DATE) / MS_PER_DAY);
      return ((days % QUESTIONS.length) + QUESTIONS.length) % QUESTIONS.length;
    }

    function formatToday() {
      return new Intl.DateTimeFormat(undefined, {
        year: "numeric",
        month: "short",
        day: "numeric",
        weekday: "short"
      }).format(new Date());
    }

    const index = getTodayQuestionIndex();
    const question = QUESTIONS[index];

    document.title = "每日一题 - " + question.title;
    document.getElementById("info").textContent =
      formatToday() + " · 第 " + (index + 1) + " 题 · " + question.title;

    document.getElementById("questionFrame").src = question.url;
  </script>
</body>
</html>
