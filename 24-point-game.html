<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>24点游戏 - 扑克牌版</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #f7f7fb, #e9eefc);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #222;
    }

    .card {
      width: 100%;
      max-width: 720px;
      background: white;
      border-radius: 22px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
    }

    h1 {
      margin: 0 0 8px;
      text-align: center;
      font-size: 34px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .mode-row {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 12px;
      color: #555;
    }

    select {
      padding: 10px 12px;
      border: 2px solid #d8ddeb;
      border-radius: 12px;
      font-size: 15px;
      background: white;
    }

    .numbers {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin: 22px 0;
    }

    .num {
      aspect-ratio: 3 / 4;
      border-radius: 18px;
      background: #fff;
      border: 2px solid #d9dfea;
      color: #222;
      font-size: 42px;
      font-weight: 850;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 18px rgba(0,0,0,0.08);
      user-select: none;
      position: relative;
    }

    .num::before,
    .num::after {
      content: attr(data-label);
      position: absolute;
      font-size: 16px;
      font-weight: 800;
      color: #777;
    }

    .num::before {
      top: 10px;
      left: 12px;
    }

    .num::after {
      bottom: 10px;
      right: 12px;
      transform: rotate(180deg);
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    input {
      flex: 1;
      padding: 15px 16px;
      font-size: 18px;
      border: 2px solid #d8ddeb;
      border-radius: 14px;
      outline: none;
    }

    input:focus,
    select:focus {
      border-color: #2f6df6;
      outline: none;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      background: #222;
      color: white;
    }

    button.secondary {
      background: #eef2ff;
      color: #2447a8;
    }

    button.good {
      background: #1f9d55;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 14px;
    }

    .message {
      margin-top: 18px;
      min-height: 30px;
      padding: 12px 14px;
      border-radius: 14px;
      background: #f5f6fa;
      line-height: 1.5;
    }

    .answer {
      margin-top: 12px;
      padding: 12px 14px;
      background: #fff8e1;
      border-radius: 14px;
      display: none;
      font-size: 17px;
      word-break: break-word;
    }

    .hint {
      margin-top: 16px;
      color: #666;
      font-size: 14px;
      line-height: 1.6;
    }

    @media (max-width: 560px) {
      .card {
        padding: 22px;
      }

      .num {
        font-size: 32px;
      }

      .input-row {
        flex-direction: column;
      }

      .buttons {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="card">
    <h1>24点游戏</h1>

    <div class="subtitle">
      使用下面 4 张牌，每张牌只能用一次。可以用 + − × ÷ 和括号，结果等于 24。
    </div>

    <div class="mode-row">
      <label for="mode">出题范围：</label>

      <select id="mode" onchange="newGame()">
        <option value="number">数字 1–10</option>
        <option value="card" selected>扑克牌 A–K</option>
      </select>

      <span>A = 1，J = 11，Q = 12，K = 13</span>
    </div>

    <section class="numbers" id="numbers"></section>

    <div class="input-row">
      <input
        id="expression"
        placeholder="例如：(K-Q)*(7+1) 或 (13-12)*(7+1)"
        autocomplete="off"
      />

      <button class="good" onclick="checkAnswer()">检查</button>
    </div>

    <div class="buttons">
      <button class="secondary" onclick="newGame()">随机出题</button>
      <button class="secondary" onclick="showAnswer()">显示答案</button>
      <button class="secondary" onclick="clearInput()">清空输入</button>
    </div>

    <div class="message" id="message">
      准备好了，输入一个表达式试试看。
    </div>

    <div class="answer" id="answer"></div>

    <div class="hint">
      说明：扑克牌版中 A 当作 1，J/Q/K 分别当作 11/12/13。<br>
      你可以直接输入 A、J、Q、K，也可以输入对应数字。<br>
      小技巧：先想办法做出 3 和 8，或者 4 和 6，再相乘得到 24。
    </div>
  </main>

  <script>
    let currentCards = [];
    let currentSolution = "";

    function cardLabel(value) {
      const labels = {
        1: "A",
        11: "J",
        12: "Q",
        13: "K"
      };

      return labels[value] || String(value);
    }

    function renderNumbers() {
      const box = document.getElementById("numbers");
      box.innerHTML = "";

      currentCards.forEach(card => {
        const div = document.createElement("div");
        div.className = "num";
        div.dataset.label = card.label;
        div.textContent = card.label;
        box.appendChild(div);
      });
    }

    function randomCards() {
      const mode = document.getElementById("mode").value;
      const max = mode === "card" ? 13 : 10;

      return Array.from({ length: 4 }, () => {
        const value = Math.floor(Math.random() * max) + 1;

        return {
          value: value,
          label: cardLabel(value)
        };
      });
    }

    function newGame() {
      let cards;
      let solution;

      do {
        cards = randomCards();
        solution = findSolution(cards.map(card => card.value));
      } while (!solution);

      currentCards = cards;
      currentSolution = solution;

      renderNumbers();

      document.getElementById("expression").value = "";
      document.getElementById("message").textContent =
        "新题目来了！请写出一个等于 24 的表达式。";

      document.getElementById("answer").style.display = "none";
      document.getElementById("answer").textContent = "";
    }

    function clearInput() {
      document.getElementById("expression").value = "";
      document.getElementById("message").textContent = "已清空。";
    }

    function showAnswer() {
      const answer = document.getElementById("answer");

      answer.style.display = "block";
      answer.textContent = "一种答案：" + currentSolution + " = 24";
    }

    function normalizeExpression(expression) {
      return expression
        .replaceAll("×", "*")
        .replaceAll("÷", "/")
        .replaceAll("−", "-")
        .replaceAll("－", "-")
        .replace(/\bA\b/gi, "1")
        .replace(/\bJ\b/gi, "11")
        .replace(/\bQ\b/gi, "12")
        .replace(/\bK\b/gi, "13");
    }

    function extractNumbers(expression) {
      const matches = expression.match(/\d+(?:\.\d+)?/g) || [];
      return matches.map(Number);
    }

    function sameMultiset(a, b) {
      const x = [...a].sort((m, n) => m - n);
      const y = [...b].sort((m, n) => m - n);

      return x.length === y.length && x.every((value, index) => value === y[index]);
    }

    function checkAnswer() {
      const raw = document.getElementById("expression").value.trim();
      const message = document.getElementById("message");

      if (!raw) {
        message.textContent = "请先输入一个表达式。";
        return;
      }

      const expression = normalizeExpression(raw);

      if (!/^[0-9+\-*/().\s]+$/.test(expression)) {
        message.textContent =
          "表达式只能包含 A/J/Q/K、数字、+、-、*、/ 和括号。";
        return;
      }

      const usedNumbers = extractNumbers(expression);
      const targetNumbers = currentCards.map(card => card.value);

      if (!sameMultiset(usedNumbers, targetNumbers)) {
        message.textContent =
          "牌使用不正确：必须且只能使用这 4 张牌各一次。A=1，J=11，Q=12，K=13。";
        return;
      }

      try {
        const result = Function("'use strict'; return (" + expression + ")")();

        if (!Number.isFinite(result)) {
          message.textContent = "表达式结果无效，可能出现除以 0。";
          return;
        }

        if (Math.abs(result - 24) < 1e-9) {
          message.textContent = "✅ 正确！";
        } else {
          message.textContent =
            "还不对，当前结果是 " + Number(result.toFixed(8)) + "。";
        }
      } catch (error) {
        message.textContent = "表达式格式有问题，请检查括号和运算符。";
      }
    }

    function findSolution(numbers) {
      const items = numbers.map(number => ({
        value: number,
        expression: String(number)
      }));

      const result = solve(items);

      return result ? result.expression : null;
    }

    function solve(items) {
      if (items.length === 1) {
        return Math.abs(items[0].value - 24) < 1e-9 ? items[0] : null;
      }

      for (let i = 0; i < items.length; i++) {
        for (let j = 0; j < items.length; j++) {
          if (i === j) continue;

          const rest = items.filter((_, index) => index !== i && index !== j);

          const a = items[i];
          const b = items[j];

          const candidates = [
            {
              value: a.value + b.value,
              expression: "(" + a.expression + "+" + b.expression + ")"
            },
            {
              value: a.value - b.value,
              expression: "(" + a.expression + "-" + b.expression + ")"
            },
            {
              value: a.value * b.value,
              expression: "(" + a.expression + "*" + b.expression + ")"
            }
          ];

          if (Math.abs(b.value) > 1e-9) {
            candidates.push({
              value: a.value / b.value,
              expression: "(" + a.expression + "/" + b.expression + ")"
            });
          }

          for (const candidate of candidates) {
            const found = solve([...rest, candidate]);

            if (found) {
              return found;
            }
          }
        }
      }

      return null;
    }

    newGame();
  </script>
</body>
</html>
